<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Game - Landmark 9 Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Helvetica', 'Arial', sans-serif; 
            height: 100dvh;
            width: 100vw;
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white; text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        .info-container {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            left: 0; width: 100%;
            display: flex; justify-content: space-around; align-items: center;
        }
        .info { font-size: 36px; font-weight: bold; }
        #score { color: #0f0; }
        #timer { color: #f00; }
        #msg { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 32px; text-align: center; color: #fff;
            white-space: pre-wrap; width: 80%;
            pointer-events: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            color: white; font-size: 20px; text-align: center;
        }
        button {
            padding: 15px 30px; font-size: 20px; margin-top: 20px;
            background: #0f0; border: none; border-radius: 10px; font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Hand Link Game</h2>
        <p>左右の手（中指の付け根）を<br>合わせるとスタート！</p>
        <p style="font-size: 14px; margin-top: 10px;">左手：赤 / 右手：青</p>
        <button onclick="startApp()">カメラを起動</button>
    </div>

    <video id="input_video" style="display:none" playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="ui-layer">
        <div class="info-container">
            <div id="score" class="info">Score: 0</div>
            <div id="timer" class="info">Time: 40</div>
        </div>
        <div id="msg"></div>
    </div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const scoreElement = document.getElementById('score');
const timerElement = document.getElementById('timer');
const msgElement = document.getElementById('msg');
const overlay = document.getElementById('overlay');

let score = 0;
let gameStarted = false;
let startTime = 0;
const gameDuration = 40; 
let countdown = gameDuration;

let currentCount = 1;
let circles = [];
let circleRadius = 40;
let isCoolDown = false;
let audioCtx = null;

const TRACKING_POINT = 9; // 中指の付け根

function startApp() {
    overlay.style.display = 'none';
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    camera.start();
    speak("カメラを起動しました。両手を合わせてください");
}

function startNewGame() {
    gameStarted = true;
    startTime = Date.now();
    score = 0;
    currentCount = 1;
    scoreElement.innerText = `Score: 0`;
    initCircles();
    beep(880, 0.3);
    speak("スタート");
}

const speech = window.speechSynthesis;
function speak(text) {
    if (speech.speaking) speech.cancel();
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = 'ja-JP';
    speech.speak(uttr);
}

function beep(freq = 1000, duration = 0.2) {
    try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        osc.start(now);
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.2, now + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.stop(now + duration);
    } catch(e) { console.error(e); }
}

function initCircles() {
    const w = canvasElement.width;
    const h = canvasElement.height;
    const positions = [
        {x: 0.2, y: 0.2}, {x: 0.8, y: 0.2},
        {x: 0.2, y: 0.4}, {x: 0.8, y: 0.4},
        {x: 0.2, y: 0.6}, {x: 0.8, y: 0.6},
        {x: 0.2, y: 0.8}, {x: 0.8, y: 0.8}
    ];
    circleRadius = w * 0.1;
    let nums = [1, 2, 3, 4, 5, 6, 7, 8].sort(() => Math.random() - 0.5);
    circles = positions.map((p, i) => ({ 
        x: p.x * w, 
        y: p.y * h, 
        num: nums[i], 
        active: true 
    }));
}

function onResults(results) {
    if (canvasElement.width !== window.innerWidth || canvasElement.height !== window.innerHeight) {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }

    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    
    // 背景ビデオ描画
    const vW = videoElement.videoWidth;
    const vH = videoElement.videoHeight;
    const sRatio = Math.max(canvasElement.width / vW, canvasElement.height / vH);
    const drawW = vW * sRatio;
    const drawH = vH * sRatio;
    const drawX = (canvasElement.width - drawW) / 2;
    const drawY = (canvasElement.height - drawH) / 2;
    canvasCtx.drawImage(results.image, drawX, drawY, drawW, drawH);

    const w = canvasElement.width;
    const h = canvasElement.height;

    // --- ゲーム進行・ターゲット描画 ---
    if (gameStarted) {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        countdown = Math.max(0, gameDuration - elapsed);
        timerElement.innerText = `Time: ${countdown}`;

        if (countdown <= 0) {
            gameStarted = false;
            isCoolDown = true;
            speak(score + "点です");
            setTimeout(() => { isCoolDown = false; }, 3000);
        }

        circles.forEach(c => {
            if (!c.active) return;
            canvasCtx.save();
            canvasCtx.globalAlpha = 0.7; 
            canvasCtx.beginPath();
            canvasCtx.arc(c.x, c.y, circleRadius, 0, 2 * Math.PI);
            canvasCtx.fillStyle = "white";
            canvasCtx.fill();
            
            canvasCtx.save();
            canvasCtx.scale(-1, 1); 
            canvasCtx.fillStyle = "black";
            canvasCtx.font = `bold ${circleRadius}px Arial`;
            canvasCtx.textAlign = "center";
            canvasCtx.textBaseline = "middle";
            canvasCtx.fillText(c.num, -c.x, c.y);
            canvasCtx.restore();
            canvasCtx.restore();
        });

        if (currentCount > 8) {
            initCircles();
            currentCount = 1;
        }
    }

    // --- 手の認識 & スタート判定 ---
    let handPositions = [];

    if (results.multiHandLandmarks && results.multiHandedness) {
        results.multiHandLandmarks.forEach((landmarks, index) => {
            const label = results.multiHandedness[index].label; 
            const pt = landmarks[TRACKING_POINT]; 
            const cursorX = pt.x * w;
            const cursorY = pt.y * h;
            
            handPositions.push({x: pt.x, y: pt.y, cx: cursorX, cy: cursorY});

            // 色設定
            const color = (label === "Left") ? "red" : "blue";

            if (gameStarted) {
                // 当たり判定
                circles.forEach(c => {
                    if (!c.active) return;
                    const dist = Math.sqrt((cursorX - c.x)**2 + (cursorY - c.y)**2);
                    if (dist < circleRadius && c.num === currentCount) {
                        c.active = false;
                        score++;
                        currentCount++;
                        scoreElement.innerText = `Score: ${score}`;
                        beep(1200, 0.1);
                    }
                });
            }

            // 追従リングの描画
            canvasCtx.beginPath();
            canvasCtx.arc(cursorX, cursorY, circleRadius * 0.7, 0, 2 * Math.PI);
            canvasCtx.strokeStyle = color;
            canvasCtx.lineWidth = 10;
            canvasCtx.stroke();
        });
    }

    // スタート判定（2つの手が近づいたか）
    if (handPositions.length === 2) {
        const dx = handPositions[0].x - handPositions[1].x;
        const dy = handPositions[0].y - handPositions[1].y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 0.08) { // 接近しきい値
            if (!gameStarted && !isCoolDown) {
                startNewGame();
            }
        }
    }

    // メッセージ管理
    if (!gameStarted) {
        if (isCoolDown) {
            msgElement.innerText = `FINISH!\nScore: ${score}`;
        } else {
            msgElement.innerHTML = "両手を合わせて<br><span style='color:#0f0; font-size:40px;'>START</span>";
        }
    } else {
        msgElement.innerText = "";
    }

    canvasCtx.restore();
}

const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});

hands.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
});

window.addEventListener('keydown', (e) => {
    if (e.key === "Escape") location.reload();
});
</script>
</body>
</html>
